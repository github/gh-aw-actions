name: Remove tag and associated commit

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to remove"
        required: true
        type: string

permissions: {}

jobs:
  prepare:
    name: Validate request
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      parent_sha: ${{ steps.resolve.outputs.parent_sha }}
      actor_role: ${{ steps.resolve.outputs.actor_role }}
      commit_url: ${{ steps.resolve.outputs.commit_url }}
      parent_url: ${{ steps.resolve.outputs.parent_url }}
      tag_url: ${{ steps.resolve.outputs.tag_url }}
      main_url: ${{ steps.resolve.outputs.main_url }}

    steps:
      - name: Check repository is not a fork
        run: |
          REPO="${{ github.repository }}"
          IS_FORK=$(gh api "repos/$REPO" --jq '.fork')
          if [[ "$IS_FORK" == "true" ]]; then
            echo "::error::This workflow is disabled on forks."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check actor has admin or maintainer role
        id: permission
        run: |
          ACTOR="$GITHUB_ACTOR"
          REPO="${{ github.repository }}"
          ROLE=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.role_name' 2>/dev/null || echo "none")
          if [[ "$ROLE" != "admin" && "$ROLE" != "maintain" ]]; then
            echo "::error::Actor '$ACTOR' does not have required role (role: '$ROLE')."
            exit 1
          fi
          echo "role=$ROLE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag and commit information
        id: resolve
        run: |
          TAG="${{ inputs.tag }}"

          git fetch --force --tags origin main

          if ! git check-ref-format "refs/tags/$TAG"; then
            echo "::error::Tag '$TAG' is not a valid tag name."
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "::error::Tag '$TAG' does not exist in this repository."
            exit 1
          fi

          COMMIT_SHA=$(git rev-list -n 1 "refs/tags/$TAG")
          if [[ -z "$COMMIT_SHA" ]]; then
            echo "::error::Could not resolve commit for tag '$TAG'."
            exit 1
          fi

          MAIN_SHA=$(git rev-parse origin/main)
          if [[ "$COMMIT_SHA" != "$MAIN_SHA" ]]; then
            echo "::error::Tag '$TAG' points to commit $COMMIT_SHA, but origin/main points to $MAIN_SHA."
            echo "::error::This workflow only removes commits when the tagged commit is the current origin/main HEAD."
            exit 1
          fi

          PARENTS=$(git show -s --format=%P "$COMMIT_SHA")
          if [[ -z "$PARENTS" ]]; then
            echo "::error::Commit '$COMMIT_SHA' has no parent commit and cannot be removed."
            exit 1
          fi
          PARENT_COUNT=$(echo "$PARENTS" | awk '{print NF}')
          if [[ "$PARENT_COUNT" -ne 1 ]]; then
            echo "::error::Commit '$COMMIT_SHA' must have exactly one parent to remove exactly one commit from main."
            exit 1
          fi
          PARENT_SHA="$PARENTS"

          REPO_URL="https://github.com/${{ github.repository }}"
          COMMIT_URL="$REPO_URL/commit/$COMMIT_SHA"
          PARENT_URL="$REPO_URL/commit/$PARENT_SHA"
          TAG_URL="$REPO_URL/releases/tag/$TAG"
          MAIN_URL="$REPO_URL/tree/main"

          {
            echo "## Removal request details"
            echo ""
            echo "Please review these raw values before approving the **confirm** environment job."
            echo ""
            echo "| Field | Raw value | URL |"
            echo "|---|---|---|"
            echo "| Repository | \\`${{ github.repository }}\\` | $REPO_URL |"
            echo "| Actor | \\`${{ github.actor }}\\` | https://github.com/${{ github.actor }} |"
            echo "| Actor role | \\`${{ steps.permission.outputs.role }}\\` | n/a |"
            echo "| Tag | \\`$TAG\\` | $TAG_URL |"
            echo "| Tagged commit | \\`$COMMIT_SHA\\` | $COMMIT_URL |"
            echo "| Parent commit (new main head) | \\`$PARENT_SHA\\` | $PARENT_URL |"
            echo "| Current main | \\`$MAIN_SHA\\` | $MAIN_URL |"
            echo ""
            echo "If you approve environment **confirm**, the next job will delete tag \\`$TAG\\` and force-push \\`main\\` to \\`$PARENT_SHA\\`."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "parent_sha=$PARENT_SHA" >> "$GITHUB_OUTPUT"
          echo "actor_role=${{ steps.permission.outputs.role }}" >> "$GITHUB_OUTPUT"
          echo "commit_url=$COMMIT_URL" >> "$GITHUB_OUTPUT"
          echo "parent_url=$PARENT_URL" >> "$GITHUB_OUTPUT"
          echo "tag_url=$TAG_URL" >> "$GITHUB_OUTPUT"
          echo "main_url=$MAIN_URL" >> "$GITHUB_OUTPUT"

  confirm:
    name: Manual confirmation
    runs-on: ubuntu-latest
    needs: prepare
    environment: confirm
    permissions: {}

    steps:
      - name: Await approval in confirm environment
        run: |
          {
            echo "## Ready for destructive operation"
            echo ""
            echo "Environment **confirm** approval is required before deletion continues."
            echo ""
            echo "- Tag: \\`${{ needs.prepare.outputs.tag }}\\`"
            echo "- Tagged commit: \\`${{ needs.prepare.outputs.commit_sha }}\\`"
            echo "- New main head after rewrite: \\`${{ needs.prepare.outputs.parent_sha }}\\`"
            echo "- Tag URL: ${{ needs.prepare.outputs.tag_url }}"
            echo "- Commit URL: ${{ needs.prepare.outputs.commit_url }}"
            echo "- Parent URL: ${{ needs.prepare.outputs.parent_url }}"
            echo "- Main URL: ${{ needs.prepare.outputs.main_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  remove:
    name: Remove tag and commit
    runs-on: ubuntu-latest
    needs:
      - prepare
      - confirm
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove tag and rewrite main
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          COMMIT_SHA: ${{ needs.prepare.outputs.commit_sha }}
          PARENT_SHA: ${{ needs.prepare.outputs.parent_sha }}
        run: |
          git fetch --force --tags origin main

          TAG_COMMIT_SHA=$(git rev-list -n 1 "refs/tags/$TAG")
          if [[ "$TAG_COMMIT_SHA" != "$COMMIT_SHA" ]]; then
            echo "::error::Tag '$TAG' currently points to $TAG_COMMIT_SHA; expected $COMMIT_SHA. Aborting."
            exit 1
          fi

          CURRENT_MAIN=$(git rev-parse origin/main)
          if [[ "$CURRENT_MAIN" != "$COMMIT_SHA" ]]; then
            echo "::error::origin/main moved to $CURRENT_MAIN after approval; expected $COMMIT_SHA. Aborting."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            git tag -d "$TAG"
          else
            echo "Local tag '$TAG' not present; continuing with remote deletion."
          fi
          git push origin ":refs/tags/$TAG"
          if git ls-remote --exit-code --refs origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' still exists after deletion push."
            exit 1
          fi

          git checkout -B main origin/main
          git reset --hard "$PARENT_SHA"
          git push origin "+HEAD:refs/heads/main"
          git fetch --force origin main
          UPDATED_MAIN=$(git rev-parse origin/main)
          if [[ "$UPDATED_MAIN" != "$PARENT_SHA" ]]; then
            echo "::error::origin/main is $UPDATED_MAIN after push; expected $PARENT_SHA."
            exit 1
          fi

          {
            echo "## Tag and commit removed"
            echo ""
            echo "- Removed tag: \\`$TAG\\`"
            echo "- Removed commit from main: \\`$COMMIT_SHA\\`"
            echo "- New main head: \\`$PARENT_SHA\\`"
          } >> "$GITHUB_STEP_SUMMARY"
