name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run zizmor on sync-actions.yml
        uses: zizmorcore/zizmor-action@v1.5.0
        with:
          args: .github/workflows/sync-actions.yml
